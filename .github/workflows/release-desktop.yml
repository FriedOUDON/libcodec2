name: Release (Windows + Linux + Apple prebuilt)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  LPCNET: "OFF"

jobs:
  # -----------------------------
  # Linux (native x86_64)
  # -----------------------------
  build-linux-x64:
    name: Linux x86_64 (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build rsync

      - name: Configure
        run: |
          cmake -S . -B build/linux-x64 -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DLPCNET=${{ env.LPCNET }} \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install/linux-x64"

      - name: Build
        run: cmake --build build/linux-x64 -j 2

      - name: Install (staging)
        run: cmake --install build/linux-x64

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          TRIP="linux-x86_64"
          PREFIX="${{ github.workspace }}/install/linux-x64"
          OUT="${{ github.workspace }}/dist"
          PKG="libcodec2-${TAG}-${TRIP}"

          rm -rf "${OUT}" && mkdir -p "${OUT}/${PKG}/LICENSES"
          [ -d "${PREFIX}/include" ] && rsync -a "${PREFIX}/include/" "${OUT}/${PKG}/include/" || true
          if [ -d "${PREFIX}/lib" ]; then
            rsync -aL "${PREFIX}/lib/" "${OUT}/${PKG}/lib/"
          elif [ -d "${PREFIX}/lib64" ]; then
            mkdir -p "${OUT}/${PKG}/lib"
            rsync -aL "${PREFIX}/lib64/" "${OUT}/${PKG}/lib/"
          else
            echo "ERROR: no lib dir under ${PREFIX}" >&2; exit 1
          fi

          cp -a COPYING THIRD_PARTY_NOTICES.md "${OUT}/${PKG}/LICENSES/"
          {
            echo "tag: ${TAG}"
            echo "commit: ${GITHUB_SHA}"
            echo "target: ${TRIP}"
            echo "cmake: $(cmake --version | head -n 1)"
            echo "configure_flags: -DLPCNET=${{ env.LPCNET }} -DBUILD_SHARED_LIBS=ON -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }}"
          } > "${OUT}/${PKG}/BUILDINFO.txt"

          (cd "${OUT}" && tar -czf "${PKG}.tar.gz" "${PKG}")
          (cd "${OUT}" && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  # -----------------------------
  # Linux (native x86_64, musl)
  # -----------------------------
  build-linux-musl-x64:
    name: Linux x86_64 (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build rsync musl-tools

      - name: Configure
        run: |
          cmake -S . -B build/linux-musl-x64 -G Ninja \
            -DCMAKE_C_COMPILER=musl-gcc \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DLPCNET=${{ env.LPCNET }} \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install/linux-musl-x64"

      - name: Build
        run: cmake --build build/linux-musl-x64 -j 2

      - name: Install (staging)
        run: cmake --install build/linux-musl-x64

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          TRIP="linux-musl-x86_64"
          PREFIX="${{ github.workspace }}/install/linux-musl-x64"
          OUT="${{ github.workspace }}/dist"
          PKG="libcodec2-${TAG}-${TRIP}"

          rm -rf "${OUT}" && mkdir -p "${OUT}/${PKG}/LICENSES"
          [ -d "${PREFIX}/include" ] && rsync -a "${PREFIX}/include/" "${OUT}/${PKG}/include/" || true
          if [ -d "${PREFIX}/lib" ]; then
            rsync -aL "${PREFIX}/lib/" "${OUT}/${PKG}/lib/"
          elif [ -d "${PREFIX}/lib64" ]; then
            mkdir -p "${OUT}/${PKG}/lib"
            rsync -aL "${PREFIX}/lib64/" "${OUT}/${PKG}/lib/"
          else
            echo "ERROR: no lib dir under ${PREFIX}" >&2; exit 1
          fi

          cp -a COPYING THIRD_PARTY_NOTICES.md "${OUT}/${PKG}/LICENSES/"
          {
            echo "tag: ${TAG}"
            echo "commit: ${GITHUB_SHA}"
            echo "target: ${TRIP}"
            echo "cmake: $(cmake --version | head -n 1)"
            echo "configure_flags: -DCMAKE_C_COMPILER=musl-gcc -DLPCNET=${{ env.LPCNET }} -DBUILD_SHARED_LIBS=ON -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }}"
          } > "${OUT}/${PKG}/BUILDINFO.txt"

          (cd "${OUT}" && tar -czf "${PKG}.tar.gz" "${PKG}")
          (cd "${OUT}" && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: linux-musl-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  # -----------------------------
  # Linux (Raspberry Pi armv7 / arm64 via dockcross)
  # -----------------------------
  build-linux-dockcross:
    name: Linux (dockcross ${{ matrix.trip }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - trip: linux-armv7
            image: dockcross/linux-armv7
            prefix: install/linux-armv7
          - trip: linux-arm64
            image: dockcross/linux-arm64
            prefix: install/linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dockcross wrapper
        run: |
          docker run --rm ${{ matrix.image }} > ./dockcross
          chmod +x ./dockcross

      - name: Configure
        run: |
          ./dockcross cmake -S . -B build/${{ matrix.trip }} -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DLPCNET=${{ env.LPCNET }} \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }} \
            -DCMAKE_INSTALL_PREFIX="/work/${{ matrix.prefix }}"

      - name: Build
        run: ./dockcross cmake --build build/${{ matrix.trip }} -j 2

      - name: Install (staging)
        run: ./dockcross cmake --install build/${{ matrix.trip }}

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          TRIP="${{ matrix.trip }}"
          PREFIX="${{ github.workspace }}/${{ matrix.prefix }}"
          OUT="${{ github.workspace }}/dist"
          PKG="libcodec2-${TAG}-${TRIP}"

          rm -rf "${OUT}" && mkdir -p "${OUT}/${PKG}/LICENSES"
          [ -d "${PREFIX}/include" ] && rsync -a "${PREFIX}/include/" "${OUT}/${PKG}/include/" || true
          if [ -d "${PREFIX}/lib" ]; then
            rsync -aL "${PREFIX}/lib/" "${OUT}/${PKG}/lib/"
          elif [ -d "${PREFIX}/lib64" ]; then
            mkdir -p "${OUT}/${PKG}/lib"
            rsync -aL "${PREFIX}/lib64/" "${OUT}/${PKG}/lib/"
          else
            echo "ERROR: no lib dir under ${PREFIX}" >&2; exit 1
          fi

          cp -a COPYING THIRD_PARTY_NOTICES.md "${OUT}/${PKG}/LICENSES/"
          {
            echo "tag: ${TAG}"
            echo "commit: ${GITHUB_SHA}"
            echo "target: ${TRIP}"
            echo "dockcross_image: ${{ matrix.image }}"
          } > "${OUT}/${PKG}/BUILDINFO.txt"

          (cd "${OUT}" && tar -czf "${PKG}.tar.gz" "${PKG}")
          (cd "${OUT}" && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.trip }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  # -----------------------------
  # macOS (native, universal)
  # -----------------------------
  build-macos-universal:
    name: macOS universal (arm64 + x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          brew install ninja || true

      - name: Configure
        run: |
          cmake -S . -B build/macos-universal -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DLPCNET=${{ env.LPCNET }} \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_CODEC2_TOOLS=ON \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/staging/macos-universal"

      - name: Build
        run: cmake --build build/macos-universal -j 2

      - name: Install (staging)
        run: cmake --install build/macos-universal

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          TRIP="macos-universal"
          PREFIX="${{ github.workspace }}/staging/macos-universal"
          OUT="${{ github.workspace }}/dist"
          PKG="libcodec2-${TAG}-${TRIP}"

          rm -rf "${OUT}" && mkdir -p "${OUT}/${PKG}/LICENSES"
          [ -d "${PREFIX}/include" ] && rsync -a "${PREFIX}/include/" "${OUT}/${PKG}/include/" || true
          if [ -d "${PREFIX}/lib" ]; then
            rsync -aL "${PREFIX}/lib/" "${OUT}/${PKG}/lib/"
          elif [ -d "${PREFIX}/lib64" ]; then
            mkdir -p "${OUT}/${PKG}/lib"
            rsync -aL "${PREFIX}/lib64/" "${OUT}/${PKG}/lib/"
          else
            echo "ERROR: no lib dir under ${PREFIX}" >&2; exit 1
          fi
          [ -d "${PREFIX}/bin" ] && rsync -a "${PREFIX}/bin/" "${OUT}/${PKG}/bin/" || true

          cp -a COPYING THIRD_PARTY_NOTICES.md "${OUT}/${PKG}/LICENSES/"
          {
            echo "tag: ${TAG}"
            echo "commit: ${GITHUB_SHA}"
            echo "target: ${TRIP}"
            echo "configure_flags: -DLPCNET=${{ env.LPCNET }} -DBUILD_SHARED_LIBS=ON -DBUILD_CODEC2_TOOLS=ON -DCMAKE_OSX_ARCHITECTURES=arm64;x86_64 -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }}"
          } > "${OUT}/${PKG}/BUILDINFO.txt"

          (cd "${OUT}" && tar -czf "${PKG}.tar.gz" "${PKG}")
          (cd "${OUT}" && shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  # -----------------------------
  # iOS (device arm64, static lib)
  # -----------------------------
  build-ios-arm64:
    name: iOS arm64 (iphoneos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          brew install ninja || true

      - name: Configure
        run: |
          cmake -S . -B build/ios-arm64 -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DLPCNET=${{ env.LPCNET }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_CODEC2_TOOLS=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/staging/ios-arm64"

      - name: Build
        run: cmake --build build/ios-arm64 -j 2

      - name: Install (staging)
        run: cmake --install build/ios-arm64

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          TRIP="ios-arm64"
          PREFIX="${{ github.workspace }}/staging/ios-arm64"
          OUT="${{ github.workspace }}/dist"
          PKG="libcodec2-${TAG}-${TRIP}"

          rm -rf "${OUT}" && mkdir -p "${OUT}/${PKG}/LICENSES"
          [ -d "${PREFIX}/include" ] && rsync -a "${PREFIX}/include/" "${OUT}/${PKG}/include/" || true
          if [ -d "${PREFIX}/lib" ]; then
            rsync -aL "${PREFIX}/lib/" "${OUT}/${PKG}/lib/"
          elif [ -d "${PREFIX}/lib64" ]; then
            mkdir -p "${OUT}/${PKG}/lib"
            rsync -aL "${PREFIX}/lib64/" "${OUT}/${PKG}/lib/"
          else
            echo "ERROR: no lib dir under ${PREFIX}" >&2; exit 1
          fi

          cp -a COPYING THIRD_PARTY_NOTICES.md "${OUT}/${PKG}/LICENSES/"
          {
            echo "tag: ${TAG}"
            echo "commit: ${GITHUB_SHA}"
            echo "target: ${TRIP}"
            echo "configure_flags: -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 -DLPCNET=${{ env.LPCNET }} -DBUILD_SHARED_LIBS=OFF -DBUILD_CODEC2_TOOLS=OFF -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }}"
          } > "${OUT}/${PKG}/BUILDINFO.txt"

          (cd "${OUT}" && tar -czf "${PKG}.tar.gz" "${PKG}")
          (cd "${OUT}" && shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: ios-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  # -----------------------------
  # Windows (clang-cl, MSVC ABI x64)
  # -----------------------------
  build-windows-msvc:
    name: Windows clang-cl (MSVC ABI x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja -y
        shell: pwsh

      - name: Check clang-cl
        run: clang-cl --version
        shell: pwsh

      - name: Configure
        run: |
          $clang = (Get-Command clang-cl).Source
          if (-not $clang) { throw "clang-cl not found in PATH" }
          Write-Host "Using clang-cl: $clang"
          cmake -S . -B build\msvc -G Ninja `
            -DCMAKE_C_COMPILER:FILEPATH="$clang" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DLPCNET=${{ env.LPCNET }} `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }} `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\staging\windows-msvc-x64"
        shell: pwsh

      - name: Verify compiler
        run: |
          $compiler = $null

          $cacheLine = (Get-Content build\msvc\CMakeCache.txt | Select-String '^CMAKE_C_COMPILER:[^=]*=' | Select-Object -First 1)
          if ($cacheLine) {
            $compiler = ($cacheLine.Line -split '=', 2)[1].Trim()
            Write-Host "Compiler from CMakeCache: $compiler"
          }

          if (-not $compiler) {
            $ccFile = Get-ChildItem build\msvc\CMakeFiles -Recurse -Filter CMakeCCompiler.cmake | Select-Object -First 1
            if ($ccFile) {
              $ccLine = (Get-Content $ccFile.FullName | Select-String 'set\(CMAKE_C_COMPILER "([^"]+)"\)' | Select-Object -First 1)
              if ($ccLine -and $ccLine.Line -match 'set\(CMAKE_C_COMPILER "([^"]+)"\)') {
                $compiler = $Matches[1]
                Write-Host "Compiler from CMakeCCompiler.cmake: $compiler"
              }
            }
          }

          if (-not $compiler) { throw "Unable to determine C compiler from CMake files" }
          if ($compiler -notmatch '(?i)clang-cl') { throw "Expected clang-cl, got: $compiler" }
        shell: pwsh

      - name: Build
        run: cmake --build build\msvc --config ${{ env.BUILD_TYPE }}
        shell: pwsh

      - name: Install (staging)
        run: cmake --install build\msvc --config ${{ env.BUILD_TYPE }}
        shell: pwsh

      - name: Package
        run: |
          $tag = "${{ github.ref_name }}"
          $trip = "windows-msvc-x64"
          $prefix = Join-Path "${{ github.workspace }}" "staging\$trip"
          $out = Join-Path "${{ github.workspace }}" "dist"
          $pkgDir = Join-Path $out "libcodec2-$tag-$trip"

          if (Test-Path $out) { Remove-Item $out -Recurse -Force }
          New-Item -ItemType Directory -Path (Join-Path $pkgDir "LICENSES") -Force | Out-Null

          if (Test-Path (Join-Path $prefix "include")) { Copy-Item (Join-Path $prefix "include") $pkgDir -Recurse -Force }
          if (Test-Path (Join-Path $prefix "lib"))     { Copy-Item (Join-Path $prefix "lib")     $pkgDir -Recurse -Force }
          if (Test-Path (Join-Path $prefix "bin"))     { Copy-Item (Join-Path $prefix "bin")     $pkgDir -Recurse -Force }

          Copy-Item "COPYING","THIRD_PARTY_NOTICES.md" (Join-Path $pkgDir "LICENSES") -Force

          @(
            "tag: $tag"
            "commit: $env:GITHUB_SHA"
            "target: $trip"
          ) | Set-Content (Join-Path $pkgDir "BUILDINFO.txt")

          $zip = Join-Path $out ("libcodec2-$tag-$trip.zip")
          Compress-Archive -Path $pkgDir -DestinationPath $zip -Force
          (Get-FileHash $zip -Algorithm SHA256).Hash + "  " + (Split-Path $zip -Leaf) | Set-Content ($zip + ".sha256")
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-x64
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  # -----------------------------
  # Windows (MinGW64 via MSYS2)
  # -----------------------------
  build-windows-mingw:
    name: Windows MinGW64 (MSYS2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            rsync
            zip

      - name: Build + Install + Package (MSYS2)
        shell: msys2 {0}
        run: |
          set -eux
          TAG="${GITHUB_REF_NAME}"
          TRIP="windows-mingw64"
          WS="$(cygpath -u "${GITHUB_WORKSPACE}")"

          cmake -S "$WS" -B "$WS/build/mingw64" -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DLPCNET=${{ env.LPCNET }} \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }} \
            -DCMAKE_INSTALL_PREFIX="$WS/staging/${TRIP}"

          cmake --build "$WS/build/mingw64" -j 2
          cmake --install "$WS/build/mingw64"

          OUT="$WS/dist"
          PKG="libcodec2-${TAG}-${TRIP}"
          rm -rf "$OUT" && mkdir -p "$OUT/$PKG/LICENSES"

          PREFIX="$WS/staging/${TRIP}"
          [ -d "$PREFIX/include" ] && rsync -a "$PREFIX/include/" "$OUT/$PKG/include/" || true
          [ -d "$PREFIX/lib" ] && rsync -a "$PREFIX/lib/" "$OUT/$PKG/lib/" || true
          [ -d "$PREFIX/bin" ] && rsync -a "$PREFIX/bin/" "$OUT/$PKG/bin/" || true

          cp -a "$WS/COPYING" "$WS/THIRD_PARTY_NOTICES.md" "$OUT/$PKG/LICENSES/"

          {
            echo "tag: ${TAG}"
            echo "commit: ${GITHUB_SHA}"
            echo "target: ${TRIP}"
          } > "$OUT/$PKG/BUILDINFO.txt"

          (cd "$OUT" && zip -r "${PKG}.zip" "${PKG}")
          (cd "$OUT" && sha256sum "${PKG}.zip" > "${PKG}.zip.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: windows-mingw64
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  # -----------------------------
  # Publish Release assets
  # -----------------------------
  release:
    name: Publish Release assets
    runs-on: ubuntu-latest
    needs:
      - build-linux-x64
      - build-linux-musl-x64
      - build-linux-dockcross
      - build-macos-universal
      - build-ios-arm64
      - build-windows-msvc
      - build-windows-mingw
    if: github.ref_type == 'tag'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*"
          merge-multiple: true

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.tar.gz.sha256
            release-assets/**/*.zip
            release-assets/**/*.zip.sha256
          body: |
            ## incomudon向け: `.so` / `.dll` の取り出し方（初心者向け）

            1. このページの `Assets` を開き、使う環境のファイルをダウンロードします。
            2. ダウンロードしたファイルを解凍します。
               - Windows: `...windows-*.zip`
               - Linux / Android: `...linux-*.tar.gz` / `...android-*.tar.gz`
            3. ライブラリ本体は次の場所にあります。
               - Windows: `bin/*.dll`（例: `codec2.dll`）
               - Linux / Android: `lib/libcodec2.so`
            4. Android はアプリの ABI と同じものを選んでください。
               - `arm64-v8a`: 多くの実機
               - `armeabi-v7a`: 32bit 実機
               - `x86` / `x86_64`: エミュレータ向け
            5. `include/` はヘッダファイルです。通常は `.so` / `.dll` を使えばOKです。
          generate_release_notes: true
