name: Release (Android prebuilt)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  # r27 toolchains can generate runtime-incompatible PLT behavior on some
  # Android 12 vendor linkers when .so is loaded from app-private storage.
  # Use a conservative NDK/API combo for maximum compatibility.
  NDK_VERSION: r23c
  ANDROID_PLATFORM: android-21
  BUILD_TYPE: Release
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  # Safer Release flags for Android runtime-loaded .so:
  # avoid aggressive optimizations that can trigger UB in older devices/NDKs.
  C_FLAGS_ANDROID_RELEASE: >-
    -O0 -DNDEBUG -fPIC -fno-strict-aliasing -fwrapv -fno-strict-overflow -fno-fast-math
    -fno-stack-protector -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0
    -DCODEC2_MODE_EN_DEFAULT=0
    -DCODEC2_MODE_3200_EN=1
    -DCODEC2_MODE_2400_EN=1
    -DCODEC2_MODE_1600_EN=1
    -DCODEC2_MODE_700C_EN=1
    -DCODEC2_MODE_450_EN=1
  SHARED_LD_FLAGS_ANDROID_RELEASE: >-
    -Wl,-z,now -Wl,-z,norelro -Wl,--no-undefined
    -Wl,--pack-dyn-relocs=none

jobs:
  build-android:
    name: Build Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          local-cache: false

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build rsync

      # もしリポジトリ側で既に修正したなら、このステップは消してOK
      - name: Hotfix for cross-compiling (temporary)
        run: |
          if grep -q "add_dependencies(generate_codebook codec2_native)" src/CMakeLists.txt; then
            sed -i 's/add_dependencies(generate_codebook codec2_native)/# add_dependencies(generate_codebook codec2_native)/' src/CMakeLists.txt
          fi

      - name: Resolve NDK path
        run: |
          set -eux
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"

          if [ ! -x "$CLANG" ]; then
            echo "NDK clang missing at: $CLANG"
            FOUND=""
            for root in "/home/runner/.setup-ndk" "${ANDROID_SDK_ROOT:-}" "${ANDROID_HOME:-}" "${ANDROID_SDK_ROOT:-}/ndk" "${ANDROID_HOME:-}/ndk"; do
              [ -n "$root" ] || continue
              [ -d "$root" ] || continue
              FOUND="$(find "$root" -type f -path '*/toolchains/llvm/prebuilt/linux-x86_64/bin/clang' | head -n 1 || true)"
              [ -n "$FOUND" ] && break
            done
            if [ -z "$FOUND" ]; then
              echo "ERROR: unable to locate NDK clang in known Android SDK/NDK paths" >&2
              exit 1
            fi
            # .../toolchains/llvm/prebuilt/linux-x86_64/bin/clang -> NDK root
            NDK="$(dirname "$(dirname "$(dirname "$(dirname "$(dirname "$(dirname "$FOUND")")")")")")"
          fi

          echo "Using NDK: $NDK"
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version | head -n 1

          echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build/${{ matrix.abi }} -G Ninja \
            -DLPCNET=OFF \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DANDROID_NDK="${ANDROID_NDK_HOME}" \
            -DANDROID_ABI="${{ matrix.abi }}" \
            -DANDROID_PLATFORM="${{ env.ANDROID_PLATFORM }}" \
            -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" \
            -DCMAKE_C_FLAGS_RELEASE="${{ env.C_FLAGS_ANDROID_RELEASE }}" \
            -DCMAKE_SHARED_LINKER_FLAGS_RELEASE="${{ env.SHARED_LD_FLAGS_ANDROID_RELEASE }}" \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM="${{ env.CMAKE_POLICY_VERSION_MINIMUM }}" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install/${{ matrix.abi }}"

      - name: Build
        run: |
          cmake --build build/${{ matrix.abi }} -j 2

      - name: Install (staging)
        run: |
          cmake --install build/${{ matrix.abi }}

      - name: Verify dynamic linker tags (BIND_NOW + no RELR)
        run: |
          set -eux
          SO="${{ github.workspace }}/install/${{ matrix.abi }}/lib/libcodec2.so"
          if [ ! -f "$SO" ]; then
            echo "ERROR: $SO not found" >&2
            exit 1
          fi
          READELF="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          "$READELF" -d "$SO" > /tmp/libcodec2.dynamic.txt
          # Some Android 12 vendor linkers are unstable with lazy PLT in runtime-loaded .so
          grep -E "FLAGS.*BIND_NOW|FLAGS_1.*NOW" /tmp/libcodec2.dynamic.txt
          # Keep reloc format conservative for broad device compatibility
          if grep -E "RELR|ANDROID_RELR" /tmp/libcodec2.dynamic.txt; then
            echo "ERROR: RELR tags found in libcodec2.so, expected none" >&2
            exit 1
          fi
          # Some Android 12 vendor linkers appear to break on runtime-loaded
          # PLT/JUMP_SLOT entries in external app-private .so files.
          "$READELF" -r "$SO" > /tmp/libcodec2.reloc.txt
          if grep -q "JUMP_SLOT" /tmp/libcodec2.reloc.txt; then
            echo "ERROR: JUMP_SLOT relocations remain; expected none for runtime-load compatibility" >&2
            grep "JUMP_SLOT" /tmp/libcodec2.reloc.txt | head -n 20
            exit 1
          fi

      - name: Package (include/lib + LICENSES)
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          ABI="${{ matrix.abi }}"
          PREFIX="${{ github.workspace }}/install/${ABI}"
          OUT="${{ github.workspace }}/dist"
          PKG="libcodec2-${TAG}-android-${ABI}"

          rm -rf "${OUT}" && mkdir -p "${OUT}/${PKG}/LICENSES"

          # include/
          if [ -d "${PREFIX}/include" ]; then
            rsync -a "${PREFIX}/include/" "${OUT}/${PKG}/include/"
          else
            echo "WARN: no include/ under ${PREFIX}"
          fi

          # lib/ (lib64 対応)
          if [ -d "${PREFIX}/lib" ]; then
            rsync -a "${PREFIX}/lib/" "${OUT}/${PKG}/lib/"
          elif [ -d "${PREFIX}/lib64" ]; then
            mkdir -p "${OUT}/${PKG}/lib"
            rsync -a "${PREFIX}/lib64/" "${OUT}/${PKG}/lib/"
          else
            echo "ERROR: no lib directory found under ${PREFIX}" >&2
            exit 1
          fi

          # ライセンス同梱
          cp -a COPYING THIRD_PARTY_NOTICES.md "${OUT}/${PKG}/LICENSES/"

          # ビルド情報
          {
            echo "tag: ${TAG}"
            echo "commit: ${GITHUB_SHA}"
            echo "abi: ${ABI}"
            echo "ndk_version: ${{ env.NDK_VERSION }}"
            echo "android_platform: ${{ env.ANDROID_PLATFORM }}"
            echo "cmake: $(cmake --version | head -n 1)"
            echo "ninja: $(ninja --version)"
            echo "configure_flags: -DLPCNET=OFF -DBUILD_SHARED_LIBS=ON -DCMAKE_POLICY_VERSION_MINIMUM=${{ env.CMAKE_POLICY_VERSION_MINIMUM }}"
          } > "${OUT}/${PKG}/BUILDINFO.txt"

          (cd "${OUT}" && tar -czf "${PKG}.tar.gz" "${PKG}")
          (cd "${OUT}" && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish Release assets
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.ref_type == 'tag'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: android-*
          merge-multiple: true

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
          body: |
            ## incomudon向け: `.so` / `.dll` の取り出し方（初心者向け）

            1. このページの `Assets` を開き、使う環境のファイルをダウンロードします。
            2. ダウンロードしたファイルを解凍します。
               - Windows: `...windows-*.zip`
               - Linux / Android: `...linux-*.tar.gz` / `...android-*.tar.gz`
            3. ライブラリ本体は次の場所にあります。
               - Windows: `bin/*.dll`（例: `codec2.dll`）
               - Linux / Android: `lib/libcodec2.so`
            4. Android はアプリの ABI と同じものを選んでください。
               - `arm64-v8a`: 多くの実機
               - `armeabi-v7a`: 32bit 実機
               - `x86` / `x86_64`: エミュレータ向け
            5. `include/` はヘッダファイルです。通常は `.so` / `.dll` を使えばOKです。
          generate_release_notes: true
